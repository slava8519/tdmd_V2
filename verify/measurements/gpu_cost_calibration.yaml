# T7.13 — PerfModel GPU cost-table calibration fixture.
#
# SPEC: docs/specs/perfmodel/SPEC.md §4.2 (calibration), §11.6 (T7.13 fixture contract).
# Exec pack: docs/development/m7_execution_pack.md T7.13.
#
# Each row binds one (hardware × build_flavor) pair to a set of measured
# per-step wall-seconds. The ±20% gate in
# `tests/perfmodel/test_gpu_cost_calibration.cpp` asserts
#   |predict_step_gpu_sec(n_atoms) - measured_step_sec(n_atoms)| / measured < 0.20
# per measurement row, using the committed factory GpuCostTables as the
# predictor. A missing file triggers SKIP (not FAIL) — Option A CI
# compliance per D-M6-6.
#
# `predict_step_gpu_sec` at n_ranks=1 returns
#   table.step_total_sec(N) + HardwareProfile::scheduler_overhead_sec
# where scheduler_overhead_sec = 30 μs on the canonical modern_x86_64 profile.
# The `measured_step_sec` column below includes that scheduler contribution —
# it is the top-level per-step wall-time the gate compares against.
#
# PROVENANCE NOTE — T7.13 ships the fixture + loader + gate infrastructure.
# The measured_step_sec values below are SYNTHETIC — scaled from the T6.11
# placeholder coefficients in `src/perfmodel/gpu_cost_tables.cpp` with a
# ±6-7% synthetic jitter that validates the ±20% gate without trivially
# satisfying it. Real Nsight-Systems traces from an RTX 5080 (or successor)
# replace this file content (no code edits needed). Replacement PR procedure
# documented in perfmodel/SPEC §11.6.

schema_version: 1

rows:
  # ------------------------------------------------------------------
  # Row A — Reference FP64 path (D-M6-7 bit-exact CPU≡GPU).
  # Predicted from committed fp64_reference table (see gpu_cost_tables.cpp):
  #   a_sum = 120 μs; b_sum ≈ 14.48 ns/atom; scheduler_overhead = 30 μs.
  #   N=10k:  predict = 294.8 μs; measured (row) = 315 μs  (+6.4% err)
  #   N=100k: predict = 1598 μs;  measured (row) = 1700 μs (+6.0% err)
  #   N=1M:   predict = 14630 μs; measured (row) = 13800 μs (−6.0% err)
  # All three points land comfortably inside the 20% gate while exercising
  # both sides of the zero-error line.
  # ------------------------------------------------------------------
  - hardware_id: "RTX 5080 (Ada consumer, 84 SM)"
    cuda_version: "13.1"
    measurement_date: "2026-04-19"
    build_flavor: "fp64_reference"
    provenance: |
      SYNTHETIC T7.13 infrastructure activation.

      Derived from T6.11 placeholder coefficients in
      src/perfmodel/gpu_cost_tables.cpp (published Ampere/Ada consumer-GPU
      benchmarks, CUDA 13.1 PCIe Gen4 x16 ~25 GB/s H2D, ~50 μs kernel
      launch-to-completion) with ±6-7% synthetic jitter on per-step
      totals. Step wall decomposition:
        a_sum = 120 μs (six launches @ ~10-50 μs each)
        b_sum ≈ 14.48 ns/atom (H2D 1.28 ns + NL 3.0 ns + EAM 5.0 ns +
                               VVpre 1.0 ns + VVpost 1.0 ns + D2H 3.2 ns)
        scheduler_overhead = 30 μs (HardwareProfile::modern_x86_64)
      Replace with real Nsight Systems trace when an RTX 5080 (or
      successor GPU bench) is attached; the replacement PR edits only
      this YAML (no code impact, no test logic change). See
      perfmodel/SPEC §11.6 for the replacement procedure.
    measurements:
      - n_atoms: 10000
        measured_step_sec: 0.000315
      - n_atoms: 100000
        measured_step_sec: 0.001700
      - n_atoms: 1000000
        measured_step_sec: 0.013800

  # ------------------------------------------------------------------
  # Row B — MixedFast path (Philosophy B, FP32 pair math + FP64 accumulators).
  # Predicted from committed mixed_fast table:
  #   a_sum = 120 μs; b_sum ≈ 12.48 ns/atom (EAM 5 ns → 3 ns); sched = 30 μs.
  #   N=10k:  predict = 274.8 μs; measured (row) = 290 μs  (+5.2% err)
  #   N=100k: predict = 1398 μs;  measured (row) = 1480 μs (+5.5% err)
  #   N=1M:   predict = 12630 μs; measured (row) = 11900 μs (−6.1% err)
  # ------------------------------------------------------------------
  - hardware_id: "RTX 5080 (Ada consumer, 84 SM)"
    cuda_version: "13.1"
    measurement_date: "2026-04-19"
    build_flavor: "mixed_fast"
    provenance: |
      SYNTHETIC T7.13 infrastructure activation — MixedFast row mirrors
      the Reference row's synthetic-jitter methodology. EAM force kernel
      b_sec_per_atom is ~1.7× faster (FP32 pair math per T6.8a traces);
      NL / VV / H2D / D2H stages are math-identical to Reference.

      Same replacement procedure as Row A when real Nsight data lands.
    measurements:
      - n_atoms: 10000
        measured_step_sec: 0.000290
      - n_atoms: 100000
        measured_step_sec: 0.001480
      - n_atoms: 1000000
        measured_step_sec: 0.011900
