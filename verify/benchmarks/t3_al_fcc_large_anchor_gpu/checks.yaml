# T3-gpu anchor-test threshold declarations.
#
# Consumed by verify/harness/anchor_test_runner/ via `backend: gpu` dispatch.
# The top-level `backend` key tells the runner whether to inject
# `runtime.backend: gpu` into the config before launch. All other keys
# parallel the CPU T3 checks.yaml structure so the runner path stays
# symmetric.
#
# T6.10a scope: gates (1) and (2). T7.12 reopened gate (3) as the EAM
# substitute Pattern 2 strong-scaling probe (`status: active_eam_substitute`)
# — Morse-vs-dissertation comparison stays deferred to M9+ per
# `gpu/SPEC.md` §1.2 (no GPU Morse kernel) and D-M7-16 (EAM substitute
# scope authorised in the M7 execution pack).

benchmark: t3_al_fcc_large_anchor_gpu

# Backend dispatch — new in T6.10a. Runner reads this and mutates a tmp
# config copy (never touching the committed file) to set `runtime.backend`.
# Accepted values: cpu (default if absent, matches historical CPU T3) or gpu.
backend: gpu

# Which N_procs rows the gates (1)+(2) run at. Single-rank by design — the
# CPU≡GPU bit-exact thermo gate is a per-step determinism check; multi-rank
# scaling lives in `efficiency_curve.ranks_to_probe` below (gate 3).
ranks_to_probe: [1]

# Gate (1) — CPU Reference ≡ GPU Reference byte-exact.
#
# The harness runs the fixture twice (CPU backend + GPU backend), captures
# each thermo stream to a file, and byte-compares. D-M6-7 extended to engine
# level by T6.7; this is the same gate routed through the anchor-test
# harness so the M6 milestone acceptance (T6.13) can consume a single report.
cpu_gpu_reference_bit_exact:
  thermo_byte_equal: true
  steps: 100

# Gate (2) — GPU MixedFast within D-M6-8 thresholds of GPU Reference.
#
# Runs the fixture a third time with MixedFast build and compares per-atom
# forces + total PE against the GPU Reference run. Delegates numeric diff
# to the T6.8a differential harness (`test_eam_mixed_fast_within_threshold.cpp`);
# the anchor runner asserts the differential's exit code, not the raw numbers.
# This avoids duplicating the FP-compare logic at the Python layer.
mixed_fast_vs_reference:
  force_relative_linf_threshold: 1.0e-5       # T6.8a achieved ceiling
  energy_relative_threshold: 1.0e-7           # T6.8a achieved ceiling
  virial_relative_normalized_threshold: 5.0e-6
  source: T6.8a achieved; D-M6-8 dense canonical (T7.0 SPEC delta)

# Gate (3) — Pattern 2 GPU strong-scaling efficiency probe (T7.12).
#
# Status flipped from `deferred` to `active_eam_substitute` per gpu/SPEC §11.4
# change log v1.0.14 (T7.12). The Morse-vs-dissertation comparison is **not**
# performed here — Andreev fig 29/30 used Morse, and the M9+ Morse GPU
# kernel hasn't landed yet (gpu/SPEC §1.2). Per D-M7-16 (M7 execution pack),
# we substitute the same Ni-Al EAM/alloy fixture used by gates (1)+(2):
# this exercises the same Pattern 2 scheduler / comm / zoning code path
# as Morse would, but with M6-blessed kernels and known thresholds.
#
# The probe injects `zoning.subdomains: [N, 1, 1]` per rank-count and
# launches via mpirun. Efficiency anchors on the smallest rank (must be
# 1) and grades subsequent ranks against `efficiency_floor_pct`. Each
# probe point emits a `GpuGateResult` with provenance fields populated;
# consumers (T6.13/T7.14 smoke harness) introspect uniformly.
efficiency_curve:
  status: active_eam_substitute
  morse_fidelity_blocker: "M9+ Morse GPU kernel (gpu/SPEC §1.2); Pattern 2 dispatch landed T7.5"
  ranks_to_probe: [1, 2]                # 864 atoms — saturate at 2-rank Pattern 2
  efficiency_floor_pct: 80.0            # D-M7-8 single-node target; T7.11 t7_mixed_scaling parity
  notes: "EAM substitute per D-M7-16; not literal Morse-vs-dissertation comparison"

# Runtime budget — infrastructure check. Single-rank 864-atom 100-step
# Ni-Al EAM on a dev-class GPU should complete in well under a minute;
# anchor budget pads to 10 minutes to absorb cold-start + probe overhead
# (gate 3 probe at N=2 doubles wall time but stays under budget).
runtime:
  wall_clock_budget_minutes: 10
