# TDMD numerical threshold registry.
#
# SPEC: docs/specs/verify/SPEC.md §3 (threshold registry).
# This is the single source of truth for all numerical tolerances. Changes
# require a threshold-change PR (Validation Engineer + Architect review per
# SPEC §3.4).
#
# Conventions
# -----------
# * Every threshold carries an explicit unit (auto-reject rule from master
#   spec / CLAUDE.md: unitless "< 0.01" is rejected).
# * `relative` thresholds are dimensionless ratios (|Δx| / |x|).
# * `absolute` thresholds carry SI / native-unit annotations in the
#   adjacent comment.
#
# Current scope: M1 T1 (Al FCC Morse NVE) + M2 T0 (Morse analytic dimer).
# Sections for other benchmarks land as they come online (T3 at M5, ...).

schema_version: 1
last_updated: 2026-04-22

tolerances:

  # ---------------------------------------------------------------------------
  # Energy comparisons (differential + conservation). §3.2 categories preserved
  # so the access API remains stable as more benchmarks land.
  # ---------------------------------------------------------------------------
  energy:
    # TDMD Reference build vs LAMMPS oracle. FP64 / FP64, identical initial
    # conditions, differences attributable to reduction-order roundoff and
    # math-library variance.
    reference_fp64_vs_lammps:
      relative: 1.0e-10
      rationale: "Reference build is the bitwise oracle; residual bounded by FP64 eps * O(N_pair)."

  # ---------------------------------------------------------------------------
  # Per-atom kinematic diffs. Exercised by benchmarks that dump final state
  # (not exercised by T1 M1 — thermo-only — but registered now so compare.py
  # has a stable contract for M2+ benchmarks).
  # ---------------------------------------------------------------------------
  kinematics:
    reference_fp64_vs_lammps:
      # Å; absolute tolerance on max |Δr_i| over all atoms.
      max_position_absolute: 1.0e-10
      # Å/ps; absolute tolerance on max |Δv_i|.
      max_velocity_absolute: 1.0e-10
      rationale: "100-step VV drift in FP64; O(step * eps * |r|) ~ 1e-12 Å empirically."

  # ---------------------------------------------------------------------------
  # Benchmark-specific thresholds override / augment the generic categories
  # above. Each benchmark's checks.yaml references a threshold_path into this
  # tree.
  # ---------------------------------------------------------------------------
  benchmarks:
    t0_morse_analytic:
      # 2-atom Morse dimer, separation r0 + 0.5 A, compared against the
      # closed-form expression |F| = 2*D*alpha*(1-e)*e, PE = D*(1-e)^2.
      # A 2-atom system has zero reduction-order roundoff, so the residual
      # budget is driven by exp() and arithmetic roundoff only — tight (1e-12)
      # relative bound is realistic on x86_64 + gcc-13. A looser threshold
      # here would silently mask a real regression.
      forces_analytic_relative: 1.0e-12
      rationale: |
        Dimer with D=1 eV, alpha=1 A^-1, r0=3 A, cutoff=6 A (hard).
        `hard_cutoff` pinned explicitly — `shifted_force` (TDMD default)
        subtracts a linear ramp, diverging from the pure-Morse analytic
        formula by O(exp(-alpha*(r_c-r0))) ~ 2.5e-3, far above 1e-12.
        See verify/benchmarks/t0_morse_analytic/README.md §"Why hard_cutoff".

    t1_al_morse_500:
      # Thermo column-wise relative diffs — exercised by run_differential.py.
      #
      # Energy columns (PE, KE, E_total) are the physical invariants: TDMD
      # Reference and LAMMPS agree on them to FP64 eps (measured residual
      # 0.0 at M1 on x86_64 + gcc-13). Temperature and pressure are derived
      # observables and carry an additional definitional residual from the
      # Boltzmann constant; see the rationale block below.
      thermo_temperature_relative: 2.0e-6
      thermo_potential_energy_relative: 1.0e-10
      thermo_kinetic_energy_relative: 1.0e-10
      thermo_total_energy_relative: 1.0e-10
      thermo_pressure_relative: 1.0e-8
      # D-M1-6 transparency check: TDMD-metal ≡ TDMD-lj (identity reference).
      # Exercised only when `--variant both` is passed to run_differential.py.
      # Both sides emit metal-unit thermo, so residual is bounded by FP
      # round-trip of the sqrt(mvv2e_metal) factor in dt and v — a handful of
      # ulps per conversion, amplified over 100 VV steps. 1e-10 rel is a
      # generous bound; measured residual at M2 is <1e-12 on x86_64+gcc-13.
      cross_unit_relative: 1.0e-10
      rationale: |
        Al FCC 5x5x5 (500 atoms), Morse (Girifalco-Weizer), NVE, 100 steps,
        dt=0.001 ps, Strategy A cutoff on both sides (LAMMPS default == TDMD
        `cutoff_strategy: hard_cutoff`).

        PE/KE/Etotal at 1e-10 rel match SPEC §3.2
        `energy.reference_fp64_vs_lammps` — the measured residual at M1 is
        exactly zero, so we keep the generic bound rather than publishing an
        artificially tight machine-specific value.

        Temperature carries an irreducible ~1.13e-6 relative offset from the
        k_B discrepancy:
          LAMMPS: boltz = 8.617343e-5   (older CODATA, truncated)
          TDMD:   kB    = 8.617333262e-5 (CODATA 2018)
        Threshold widened to 2e-6 with this constant in mind — tightening it
        would require changing TDMD's physical constant, which we refuse on
        fidelity grounds.

        Pressure: kept at 1e-8 — `compare.py` uses LAMMPS's truncated
        `nktv2p = 1.6021765e+6` so the conversion is definition-matched to
        the oracle; the residual budget is pure reduction-order roundoff.

    # -------------------------------------------------------------------------
    # GPU MixedFast (Philosophy B) differential thresholds — T7.0 canonical.
    #
    # SPEC delta history
    # ------------------
    # v1.0 (M6 T6.2 kickoff): single flat target 1e-6 force / 1e-8 PE / 1e-5
    #   NVE drift. Prior to any GPU kernel landing.
    # v1.0.6 (M6 T6.8a shipped): measured 1e-5 force / 1e-7 PE / 5e-6 virial
    #   on Ni-Al B2 + Al FCC; test thresholds set to measurements; spec table
    #   marked "target X, shipped Y" pending formal decision.
    # v1.0.12 (M7 T7.0 SPEC delta): formal split by cutoff density.
    #   * dense-cutoff (EAM/MEAM/SNAP/PACE/MLIAP, ≥20 neighbors) → canonical
    #     1e-5 / 1e-7 / 5e-6 (shipped values formalized);
    #   * sparse-cutoff (LJ/Morse, 2-8 neighbors) → 1e-6 / 1e-8 ambition
    #     retained, activates when those styles land on GPU (M9+).
    #
    # Why the relaxation is forced by physics, not by implementation laziness
    # -----------------------------------------------------------------------
    # Philosophy B MixedFast narrows r² / sqrtf / inv_r to FP32 (SFU throughput
    # gain); everything downstream — spline Horner, phi chain, per-atom
    # accumulators — stays FP64. The narrowed `inv_r` is cast to double before
    # entering the force chain, which bakes in a fresh FP32 rounding per pair
    # (~6e-8 rel). On dense-cutoff stencils (~50 neighbors on B2 / FCC), per-op
    # rel errors accumulate as 6e-8 × √50 × sign-cancellation-factor(~20) ≈ a
    # few × 10⁻⁶ — the 10⁻⁵ floor measured in T6.8a is the FP32 precision
    # ceiling for this arithmetic pattern, not a kernel bug.
    #
    # Tightening to 10⁻⁶ on dense stencils would require storing `rho_coeffs`
    # / `F_coeffs` / `z_coeffs` in FP32 device memory with reparameterized
    # coefficient-stability review (Mishin 2004 z/F decimal orders differ by
    # 4-6 across cutoff; FP32 Horner loses monotonicity on ρ and φ branches
    # per T6.8a empirical data). Deferred M9+ behind a prospective
    # MixedFastAggressiveBuild (Philosophy A) flavor. Memory reference:
    # `project_fp32_eam_ceiling.md`.
    # -------------------------------------------------------------------------
    gpu_mixed_fast:
      dense_cutoff:
        # Per-atom force L∞ rel-diff vs Fp64ReferenceBuild GPU on the same
        # fixture (Ni-Al B2 1024 atoms + Al FCC 864 atoms, Mishin 2004 EAM).
        # Shipped and enforced by tests/gpu/test_eam_mixed_fast_within_threshold.cpp.
        eam_force_relative: 1.0e-5
        # Total PE rel-diff under the same fixture. Derived from force
        # residual on ~3N pair terms; ~10× stricter than force in practice
        # because pair-sum cancels sign-uncorrelated components.
        eam_energy_relative: 1.0e-7
        # Virial Voigt tensor normalized by max component (off-diagonal
        # near-zero on symmetric B2; max-component normalization keeps the
        # rel-diff physically meaningful instead of dividing by its own
        # near-zero magnitude).
        eam_virial_rel_to_max: 5.0e-6
        # NVE energy conservation over 1000 steps. Integrator-level, not a
        # force gate; the 100-step harness in tests/gpu/test_t4_nve_drift.cpp
        # asserts 1e-6 per 100 steps = 10× margin under the 1000-step cap.
        nve_drift_per_1000_steps: 1.0e-5
      sparse_cutoff:
        # Ambition values for LJ/Morse/pair styles when they land on GPU
        # (M9+). Not currently active — no kernel exercises them yet.
        eam_force_relative: 1.0e-6
        eam_energy_relative: 1.0e-8
        status: deferred_m9_plus
      rationale: |
        See docs/specs/gpu/SPEC.md §8.3 for the full analysis and memory
        `project_fp32_eam_ceiling.md` for the T6.8a dev history.
        Summary: dense-cutoff 1e-5 is an FP32 precision ceiling. Relaxing
        the test thresholds would hide real regressions; tightening them
        would fail for physics reasons, not implementation reasons.

    # -------------------------------------------------------------------------
    # GPU MixedFastSnapOnly (Philosophy B-het) differential thresholds.
    #
    # SPEC delta history
    # ------------------
    # v1.0.0 (M8 T8.8 landed 2026-04-20): §D.17 7-step procedure closed; new
    #   BuildFlavor `MixedFastSnapOnlyBuild` shipped with SNAP=FP32 + EAM=FP64
    #   per-kernel precision split (heterogeneous = Philosophy B-het).
    # v1.0.1 (M8 T8.13 unblock — 2026-04-21): NVE drift gate rescoped from
    #   1000-step to 100-step horizon under pure-SNAP fixture. See the
    #   "Pure-SNAP stability horizon" note below. SPEC delta logged in
    #   TDMD_Engineering_Spec.md Приложение C.
    #
    # Derivation summary
    # ------------------
    # * SNAP force / energy budgets inherit MixedFastBuild dense-cutoff
    #   D-M6-8 analog (D-M8-8): FP32 SNAP force chain, FP64 state + accum +
    #   reduction. Justified by SNAP fit RMSE ≈ 13.8 meV/atom (Wood&Thompson
    #   2017, arXiv:1702.07042) being ~3 orders of magnitude above FP32 force
    #   residual at dense-cutoff stencils (~1e-5 rel). FP32 SNAP is
    #   scientifically indistinguishable from FP64 SNAP at the ML noise floor.
    # * EAM force / energy / virial budgets inherit MixedFastBuild values
    #   verbatim: **EAM stays FP64 in this flavor**, so residual vs FP64
    #   reference is pure reduction-order roundoff (~1e-14), but the
    #   published ceiling is anchored at MixedFastBuild's 1e-5/1e-7/5e-6
    #   dense-cutoff values (T6.8a / T7.0 history — `project_fp32_eam_ceiling.md`
    #   memory). This is **not** a relaxation — it is the "we do not exceed
    #   MixedFastBuild on any metric" commitment this flavor makes.
    # * NVE drift per 100 steps anchors against the √-scaled diffusive
    #   model of the original 1e-5/1000 MixedFastBuild envelope:
    #   1e-5 × √(100/1000) = 3.16e-6 → 3.0e-6 rounded. Integrator-level
    #   drift is dominated by reduction-order round-off random walk on the
    #   FP64 accumulator; the √-scaled form is the correct reduction for a
    #   shorter horizon. See "Pure-SNAP stability horizon" below for why
    #   the 1000-step form is physically ill-posed on this fixture.
    #
    # Pure-SNAP stability horizon (T8.13 unblock)
    # -------------------------------------------
    # The canonical T6 1024-atom W BCC fixture runs **pure SNAP** (no ZBL
    # short-range repulsion — ZBL composition lands at M9+, see
    # `config.yaml.template` header). LAMMPS itself diverges on this fixture
    # under Langevin NVT @ 300 K, tdamp=0.01 ps, dt=0.1 fs within
    # ~2000-2500 steps (T → 270 kK, PE → −55 keV); CG minimize hits
    # neighbor-list overflow on the same starting state. Upstream
    # Wood & Thompson 2017 use `pair_style hybrid/overlay zbl 4.0 4.8 snap`
    # for this exact reason — ZBL masks close-range SNAP wells — and stop
    # at 100 steps. Therefore a 1000-step NVE drift gate on pure-SNAP is
    # physically unreachable regardless of integrator or precision; it is
    # bounded by the potential's stability horizon, not FP round-off.
    # Shorten the horizon to 100 steps (matches upstream reference-run
    # length) with the √-scaled threshold preserved.
    #
    # Promise: **all thresholds equal-or-tighter than `gpu_mixed_fast`.** This
    # flavor narrows the precision combination; it does not widen any
    # envelope. The 100-step horizon is a tighter temporal window; the
    # per-step drift budget (3e-6/100 = 3e-8/step) is ~3× tighter than
    # MixedFastBuild's implied 1e-5/1000 = 1e-8/step on the diffusive floor.
    #
    # Status
    # ------
    # * active from T8.8 (SPEC + CMake option shipped 2026-04-20);
    # * kernel split emission lands at T8.9 (SNAP FP32 branch under
    #   `TDMD_FLAVOR_MIXED_FAST_SNAP_ONLY` + EAM FP64 preservation);
    # * slow-tier VerifyLab pass (§D.17 step 5) under T8.12 — hard gate
    #   before M8 closure;
    # * drift-gate rescope (v1.0.1) lands 2026-04-21 under T8.13 unblock
    #   path, Option A. Re-enable 1000-step form after M9 ZBL hybrid
    #   composition if physically meaningful on that composed fixture.
    #
    # Rationale doc: docs/specs/potentials/mixed_fast_snap_only_rationale.md
    # -------------------------------------------------------------------------
    gpu_mixed_fast_snap_only:
      snap:
        # Per-atom SNAP force L∞ rel-diff vs Fp64ReferenceBuild GPU on T6
        # tungsten fixture (W_2940_2017_2.snap, 2048-atom BCC W). Inherits
        # MixedFastBuild dense-cutoff 1e-5 ceiling per D-M8-8.
        force_relative: 1.0e-5
        # Total SNAP PE rel-diff under same fixture. Pair-sum cancellation
        # ~10x over force residual.
        energy_relative: 1.0e-7
      eam:
        # EAM in this flavor runs FP64 — residual is pure reduction-order
        # roundoff (~1e-14 empirically). Budget anchored at MixedFastBuild's
        # published dense-cutoff ceiling to keep "equal-or-tighter" promise.
        force_relative: 1.0e-5
        energy_relative: 1.0e-7
        virial_rel_to_max: 5.0e-6
      # NVE energy conservation over 100 steps. Integrator-level; FP64
      # state + accum. Horizon chosen to stay inside the pure-SNAP
      # stability envelope (see header note); √-scaled from the original
      # 1e-5/1000 gate via diffusive-drift model → 1e-5 × √(100/1000) ≈
      # 3.16e-6, rounded down to 3.0e-6. Measured bring-up (2026-04-21,
      # RTX 5080): Fp64Reference 5.80e-7, MixedFastSnapOnly 7.55e-7 —
      # ~4× headroom under the gate, strong regression sensitivity.
      nve_drift_per_100_steps: 3.0e-6
      rationale: |
        Full derivation in docs/specs/potentials/mixed_fast_snap_only_rationale.md
        §3 (empirical evidence SNAP FP32 is below ML fit noise floor) and §4
        (threshold budget table). All force/energy thresholds equal-or-tighter
        than `gpu_mixed_fast`. NVE drift rescoped v1.0.1 to 100-step horizon
        because the T6 pure-SNAP fixture is physically unstable over 1000
        steps — upstream LAMMPS reproduces the same divergence under Langevin
        damping, so it is not a TDMD regression. The √-scaled 3e-6 gate
        preserves the per-step drift budget (actually tightens it ~3×) while
        landing inside the potential's stability envelope. 1000-step form
        is re-enabled as a follow-on after M9 ZBL hybrid composition.

    t4_nial_alloy:
      # Ni-Al FCC 6×6×6 (864 atoms), 50:50 random, Mishin 2004 EAM/alloy, NVE,
      # 100 steps, dt=0.001 ps, hard cutoff (LAMMPS `pair_style eam/alloy`
      # default — no shifted-force for EAM; smoothing arrives with T3.*).
      #
      # Thermo thresholds mirror T1 one-for-one: the LAMMPS↔TDMD numerical
      # envelope is set by reduction order + constant discrepancies, not by
      # the choice of pair style.  EAM's two-pass force assembly adds more
      # FLOPs per step but does not widen the residual in FP64.
      thermo_temperature_relative: 2.0e-6
      thermo_potential_energy_relative: 1.0e-10
      thermo_kinetic_energy_relative: 1.0e-10
      thermo_total_energy_relative: 1.0e-10
      thermo_pressure_relative: 1.0e-8

      # Per-atom-per-component forces diff (T2.8 forces layer).  Threshold
      # anchored to `energy.reference_fp64_vs_lammps` — EAM forces are
      # differentiated analytically from the same Hermite spline both sides
      # use (TDMD: `TabulatedFunction`, LAMMPS: `pair_eam.cpp::compute`), so
      # residual is bounded by FP64 eps · O(N_pair) ~ 1e-14 empirically.
      # 1e-10 keeps a 4-decade safety margin for CPU architecture / BLAS
      # variance without being so loose it would hide real regressions.
      forces_relative: 1.0e-10
      rationale: |
        Ni-Al Mishin 2004 EAM/alloy differential.  Both TDMD and LAMMPS
        consume the exact same setfl file (verbatim bytes, no resampling —
        see verify/third_party/potentials/README.md), so the pair/embedding
        table is identical.  Expected residual in FP64:
          * PE / KE / E_total ≈ 0 (reduction-order roundoff only)
          * Forces ≈ 0 (same spline derivation on both sides)
          * Temperature ≈ 1.13e-6 rel (k_B discrepancy, same as T1)
          * Pressure ≈ 1e-10 rel (nktv2p conversion is matched)

        M2 acceptance gate (master spec §14 M2): failing this benchmark
        blocks M2 closure.  Treat threshold relaxations here as a red flag
        — first bisect the regression.

    t6_snap_tungsten:
      # SNAP tungsten differential vs LAMMPS ML-SNAP (Wood & Thompson 2017,
      # arXiv:1702.07042, 2940 DFT configs, pure W, BCC, twojmax=8, rcutfac=4.73442,
      # 56 linear coefficients). Canonical fixture D-M8-3. Entries below scaffold
      # the M8 acceptance gate (master spec §14 M8); full scientific context +
      # variant table in verify/benchmarks/t6_snap_tungsten/README.md.
      #
      # Scaffold landed T8.10a (2026-04-20). Measurement lands at T8.10 proper,
      # gated on T8.4b (SnapPotential force body port). Threshold numbers below
      # are budget-set from the SNAP-specific analysis in
      # docs/specs/potentials/mixed_fast_snap_only_rationale.md §4 and the
      # D-M6-7 byte-exact extension precedent (§6.7 SPEC).
      cpu_fp64_vs_lammps:
        # D-M8-7 (master spec §14 M8): TDMD Fp64Reference CPU path ≡ LAMMPS FP64
        # to ≤ 1e-12 relative on both thermo columns and per-atom forces. Both
        # sides consume the same .snap/.snapcoeff/.snapparam bytes (verbatim,
        # via the submodule) and the same ZBL screening form, so the residual
        # is bounded by FP64 eps · O(N_pair · k_max) ~ 1e-14 empirically on the
        # 128-atom small variant; 1e-12 preserves two decades of headroom.
        thermo_temperature_relative: 2.0e-6   # k_B discrepancy floor (same as T1/T4).
        thermo_potential_energy_relative: 1.0e-12
        thermo_kinetic_energy_relative: 1.0e-12
        thermo_total_energy_relative: 1.0e-12
        thermo_pressure_relative: 1.0e-10     # nktv2p + virial reduction order.
        forces_relative: 1.0e-12

      gpu_fp64_vs_cpu_fp64:
        # D-M6-7 byte-exact extension to SNAP (landed gate pattern — see
        # docs/specs/potentials/SPEC.md §6.7). GPU Fp64Production vs CPU
        # Fp64Reference under the *same* bispectrum math. Residual comes solely
        # from GPU reduction order on bispectrum accumulator; 1e-12 is the same
        # envelope as D-M6-7 for EAM.
        #
        # STATUS: ACTIVE (landed T8.7, 2026-04-20). Gate enforced by
        # tests/gpu/test_snap_gpu_bit_exact.cpp on a 10×10×10 BCC W rattled
        # 2000-atom fixture (≥ spec §4.7 envelope). Measured headroom at
        # landing: PE rel 2.04e-16, worst per-atom force rel 1.69e-14 (≈ √k_max
        # · ε_FP64 as expected for canonical Kahan-free FP64 accumulation with
        # k_max = 55), worst virial Voigt rel 2.04e-13 (smallest-abs Voigt
        # component dominated by denominator floor). 4 OoM headroom under the
        # 1e-12 gate on forces; 1 OoM on worst virial component. D-M6-7
        # byte-exact oracle chain extended to GPU SNAP; D-M8-13 closed.
        forces_relative: 1.0e-12

      rationale: |
        M8 primary acceptance gate (master spec §14 M8): SNAP proof-of-value.
        Three check layers nest from oracle to product:
          * CPU FP64 ≡ LAMMPS FP64 (this `cpu_fp64_vs_lammps.*` block,
            exercised by T8.5 — blocks M8 close).
          * GPU FP64 ≡ CPU FP64 (this `gpu_fp64_vs_cpu_fp64.*` block,
            exercised by T8.7 — blocks the GPU oracle gate).
          * GPU MixedFastSnapOnly dense-cutoff (uses the shared
            `gpu_mixed_fast_snap_only.*` block above — this benchmark does not
            re-declare those thresholds; exercised by T8.9 + T8.12 slow-tier).

        Tightness vs T4 (EAM 1e-10): SNAP fixture uses the canonical Wood 2017
        coefficient set (no local refit) and its bispectrum summation depth
        is shallower than EAM's embedding two-pass, so FP64 residual bounds
        are one or two decades tighter. Relaxing any threshold in this block
        is a red flag — master spec §D.15 bisect protocol applies.

        Repo-size note (D-M8-3): coefficient files are NOT tracked by TDMD;
        they arrive via the LAMMPS submodule (pin stable_22Jul2025_update4) at
        `verify/third_party/lammps/examples/snap/`. Benchmark driver resolves
        them via `LAMMPS_EXAMPLES_DIR` env var (default = submodule path) so
        cloud-burst hosts can relocate without a threshold change.

    # ---------------------------------------------------------------------------
    # T8 NVT Al FCC canonical benchmark — RESERVED at M9 T9.1 (2026-04-22).
    # Values calibrated by T9.10 on the first successful 10^5-step run; until
    # then all rows carry `status: reserved` and MUST NOT be consulted by CI
    # (benchmark harness is gated to reserved-throw per SPEC §3.4).
    # ---------------------------------------------------------------------------
    t8_al_fcc_nvt:
      # Equipartition band: <KE> = (3/2)·N·k_B·T within ±3% relative over the
      # 10^5-step sampling window (after 10^4-step equilibration discarded).
      # Activated by T9.10 after measurement on target hardware.
      equipartition_rel_band:
        relative: 0.03
        status: reserved
        target_milestone: M9
        activation_task: T9.10
        rationale: >-
          3% envelope absorbs expected Nosé-Hoover chain phase-space sampling
          noise at M=3, damping_time=0.1 ps, thermostat_update_interval=50.
          Tighter band risks false-red during normal canonical-ensemble
          fluctuations; looser band masks integrator drift. See
          integrator/SPEC §4.4.

      # Maxwell-Boltzmann velocity distribution goodness-of-fit (chi-squared
      # p-value MIN — rejection at p < threshold). Per-component v_x,v_y,v_z.
      maxwell_boltzmann_chi2_p_min:
        absolute: 0.05
        status: reserved
        target_milestone: M9
        activation_task: T9.10
        rationale: >-
          Standard 5% significance bar — rejects only statistically strong
          deviations from canonical distribution. Aligns with LAMMPS NVT
          integration-test conventions.

      # Deterministic 100-step gate: TDMD vs LAMMPS fix nvt, identical velocity
      # seed + identical thermostat params + identical EAM coeffs. Rel
      # residual on per-atom positions + velocities at step 100.
      lammps_step100_forces_rel:
        relative: 1.0e-10
        status: reserved
        target_milestone: M9
        activation_task: T9.3
        rationale: >-
          Pre-divergence deterministic window. LAMMPS fix nvt Trotter
          ordering matches integrator/SPEC §4.2 canonical 7-step form
          bit-for-bit up to ~100 steps before chaotic divergence dominates.
          Tightness matches T4 EAM NVE reference_fp64_vs_lammps.

      # Statistical 10^4-step gate: ensemble average temperature within ±3 K
      # of setpoint (~1% relative at 300 K).
      lammps_statistical_temp_k_tol:
        absolute: 3.0
        status: reserved
        target_milestone: M9
        activation_task: T9.10
        rationale: >-
          3 K absolute tolerance at T=300 K = 1% relative; consistent with
          LAMMPS NVT validation precedent. Tightens proportionally at lower
          T — explicit absolute form preferred to fractional because physical
          temperature distribution width is absolute, not relative.

      # NVE-sanity regression: run identical setup without thermostat; drift
      # must match T1 metal-units Al-FCC canonical NVE drift envelope.
      nve_drift_per_1000_steps:
        relative: 1.0e-5
        status: reserved
        target_milestone: M9
        activation_task: T9.2
        rationale: >-
          Reaffirms Trotter ordering correctness — thermostat-free branch
          must reproduce the verified T1 NVE envelope. Direct regression
          guard against accidental VV-path perturbation during NVT refactor.

    # ---------------------------------------------------------------------------
    # T9 NPT Al FCC canonical benchmark — RESERVED at M9 T9.1 (2026-04-22).
    # Values calibrated by T9.11. Same reserved-throw policy as T8 above.
    # ---------------------------------------------------------------------------
    t9_al_fcc_npt:
      # Equilibrium volume match LAMMPS NPT within 2% relative. Volume is a
      # strongly ensemble-averaged observable; LAMMPS baseline under identical
      # pressure + temperature + EAM coeffs is the direct reference.
      equilibrium_volume_rel_tol:
        relative: 0.02
        status: reserved
        target_milestone: M9
        activation_task: T9.11
        rationale: >-
          2% absorbs barostat-coupling-interval discretization (default
          barostat_update_interval=100) + finite-sample statistical error on
          the 10^4-step averaging window. Volume is the primary NPT observable;
          tighter band risks false-red on legitimate pressure fluctuation
          noise, looser band misses equation-of-state miscalibration.

      # Volume fluctuation σ_V match within 5% relative. Fluctuation magnitude
      # is κ_T·k_B·T·V (isothermal compressibility); LAMMPS under matched
      # params is the reference.
      volume_fluctuation_rel_tol:
        relative: 0.05
        status: reserved
        target_milestone: M9
        activation_task: T9.11
        rationale: >-
          5% on σ_V is ~2× looser than ⟨V⟩ band because fluctuation variance
          requires larger sample for stable estimate. Standard statistical-
          ensemble-validation convention.

      # Deterministic 100-step box parity: box volume + atom positions vs
      # LAMMPS fix npt iso at step 100.
      lammps_step100_box_rel:
        relative: 1.0e-10
        status: reserved
        target_milestone: M9
        activation_task: T9.7
        rationale: >-
          Same pre-divergence gate as T8; NPT adds a box-volume check
          alongside positions/velocities since barostat variable is a new
          degree of freedom. Rel budget identical — Trotter ordering is the
          sole source of residual at step 100.
