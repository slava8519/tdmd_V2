# TDMD numerical threshold registry.
#
# SPEC: docs/specs/verify/SPEC.md §3 (threshold registry).
# This is the single source of truth for all numerical tolerances. Changes
# require a threshold-change PR (Validation Engineer + Architect review per
# SPEC §3.4).
#
# Conventions
# -----------
# * Every threshold carries an explicit unit (auto-reject rule from master
#   spec / CLAUDE.md: unitless "< 0.01" is rejected).
# * `relative` thresholds are dimensionless ratios (|Δx| / |x|).
# * `absolute` thresholds carry SI / native-unit annotations in the
#   adjacent comment.
#
# Current scope: M1 T1 (Al FCC Morse NVE) + M2 T0 (Morse analytic dimer).
# Sections for other benchmarks land as they come online (T3 at M5, ...).

schema_version: 1
last_updated: 2026-04-20

tolerances:

  # ---------------------------------------------------------------------------
  # Energy comparisons (differential + conservation). §3.2 categories preserved
  # so the access API remains stable as more benchmarks land.
  # ---------------------------------------------------------------------------
  energy:
    # TDMD Reference build vs LAMMPS oracle. FP64 / FP64, identical initial
    # conditions, differences attributable to reduction-order roundoff and
    # math-library variance.
    reference_fp64_vs_lammps:
      relative: 1.0e-10
      rationale: "Reference build is the bitwise oracle; residual bounded by FP64 eps * O(N_pair)."

  # ---------------------------------------------------------------------------
  # Per-atom kinematic diffs. Exercised by benchmarks that dump final state
  # (not exercised by T1 M1 — thermo-only — but registered now so compare.py
  # has a stable contract for M2+ benchmarks).
  # ---------------------------------------------------------------------------
  kinematics:
    reference_fp64_vs_lammps:
      # Å; absolute tolerance on max |Δr_i| over all atoms.
      max_position_absolute: 1.0e-10
      # Å/ps; absolute tolerance on max |Δv_i|.
      max_velocity_absolute: 1.0e-10
      rationale: "100-step VV drift in FP64; O(step * eps * |r|) ~ 1e-12 Å empirically."

  # ---------------------------------------------------------------------------
  # Benchmark-specific thresholds override / augment the generic categories
  # above. Each benchmark's checks.yaml references a threshold_path into this
  # tree.
  # ---------------------------------------------------------------------------
  benchmarks:
    t0_morse_analytic:
      # 2-atom Morse dimer, separation r0 + 0.5 A, compared against the
      # closed-form expression |F| = 2*D*alpha*(1-e)*e, PE = D*(1-e)^2.
      # A 2-atom system has zero reduction-order roundoff, so the residual
      # budget is driven by exp() and arithmetic roundoff only — tight (1e-12)
      # relative bound is realistic on x86_64 + gcc-13. A looser threshold
      # here would silently mask a real regression.
      forces_analytic_relative: 1.0e-12
      rationale: |
        Dimer with D=1 eV, alpha=1 A^-1, r0=3 A, cutoff=6 A (hard).
        `hard_cutoff` pinned explicitly — `shifted_force` (TDMD default)
        subtracts a linear ramp, diverging from the pure-Morse analytic
        formula by O(exp(-alpha*(r_c-r0))) ~ 2.5e-3, far above 1e-12.
        See verify/benchmarks/t0_morse_analytic/README.md §"Why hard_cutoff".

    t1_al_morse_500:
      # Thermo column-wise relative diffs — exercised by run_differential.py.
      #
      # Energy columns (PE, KE, E_total) are the physical invariants: TDMD
      # Reference and LAMMPS agree on them to FP64 eps (measured residual
      # 0.0 at M1 on x86_64 + gcc-13). Temperature and pressure are derived
      # observables and carry an additional definitional residual from the
      # Boltzmann constant; see the rationale block below.
      thermo_temperature_relative: 2.0e-6
      thermo_potential_energy_relative: 1.0e-10
      thermo_kinetic_energy_relative: 1.0e-10
      thermo_total_energy_relative: 1.0e-10
      thermo_pressure_relative: 1.0e-8
      # D-M1-6 transparency check: TDMD-metal ≡ TDMD-lj (identity reference).
      # Exercised only when `--variant both` is passed to run_differential.py.
      # Both sides emit metal-unit thermo, so residual is bounded by FP
      # round-trip of the sqrt(mvv2e_metal) factor in dt and v — a handful of
      # ulps per conversion, amplified over 100 VV steps. 1e-10 rel is a
      # generous bound; measured residual at M2 is <1e-12 on x86_64+gcc-13.
      cross_unit_relative: 1.0e-10
      rationale: |
        Al FCC 5x5x5 (500 atoms), Morse (Girifalco-Weizer), NVE, 100 steps,
        dt=0.001 ps, Strategy A cutoff on both sides (LAMMPS default == TDMD
        `cutoff_strategy: hard_cutoff`).

        PE/KE/Etotal at 1e-10 rel match SPEC §3.2
        `energy.reference_fp64_vs_lammps` — the measured residual at M1 is
        exactly zero, so we keep the generic bound rather than publishing an
        artificially tight machine-specific value.

        Temperature carries an irreducible ~1.13e-6 relative offset from the
        k_B discrepancy:
          LAMMPS: boltz = 8.617343e-5   (older CODATA, truncated)
          TDMD:   kB    = 8.617333262e-5 (CODATA 2018)
        Threshold widened to 2e-6 with this constant in mind — tightening it
        would require changing TDMD's physical constant, which we refuse on
        fidelity grounds.

        Pressure: kept at 1e-8 — `compare.py` uses LAMMPS's truncated
        `nktv2p = 1.6021765e+6` so the conversion is definition-matched to
        the oracle; the residual budget is pure reduction-order roundoff.

    # -------------------------------------------------------------------------
    # GPU MixedFast (Philosophy B) differential thresholds — T7.0 canonical.
    #
    # SPEC delta history
    # ------------------
    # v1.0 (M6 T6.2 kickoff): single flat target 1e-6 force / 1e-8 PE / 1e-5
    #   NVE drift. Prior to any GPU kernel landing.
    # v1.0.6 (M6 T6.8a shipped): measured 1e-5 force / 1e-7 PE / 5e-6 virial
    #   on Ni-Al B2 + Al FCC; test thresholds set to measurements; spec table
    #   marked "target X, shipped Y" pending formal decision.
    # v1.0.12 (M7 T7.0 SPEC delta): formal split by cutoff density.
    #   * dense-cutoff (EAM/MEAM/SNAP/PACE/MLIAP, ≥20 neighbors) → canonical
    #     1e-5 / 1e-7 / 5e-6 (shipped values formalized);
    #   * sparse-cutoff (LJ/Morse, 2-8 neighbors) → 1e-6 / 1e-8 ambition
    #     retained, activates when those styles land on GPU (M9+).
    #
    # Why the relaxation is forced by physics, not by implementation laziness
    # -----------------------------------------------------------------------
    # Philosophy B MixedFast narrows r² / sqrtf / inv_r to FP32 (SFU throughput
    # gain); everything downstream — spline Horner, phi chain, per-atom
    # accumulators — stays FP64. The narrowed `inv_r` is cast to double before
    # entering the force chain, which bakes in a fresh FP32 rounding per pair
    # (~6e-8 rel). On dense-cutoff stencils (~50 neighbors on B2 / FCC), per-op
    # rel errors accumulate as 6e-8 × √50 × sign-cancellation-factor(~20) ≈ a
    # few × 10⁻⁶ — the 10⁻⁵ floor measured in T6.8a is the FP32 precision
    # ceiling for this arithmetic pattern, not a kernel bug.
    #
    # Tightening to 10⁻⁶ on dense stencils would require storing `rho_coeffs`
    # / `F_coeffs` / `z_coeffs` in FP32 device memory with reparameterized
    # coefficient-stability review (Mishin 2004 z/F decimal orders differ by
    # 4-6 across cutoff; FP32 Horner loses monotonicity on ρ and φ branches
    # per T6.8a empirical data). Deferred M9+ behind a prospective
    # MixedFastAggressiveBuild (Philosophy A) flavor. Memory reference:
    # `project_fp32_eam_ceiling.md`.
    # -------------------------------------------------------------------------
    gpu_mixed_fast:
      dense_cutoff:
        # Per-atom force L∞ rel-diff vs Fp64ReferenceBuild GPU on the same
        # fixture (Ni-Al B2 1024 atoms + Al FCC 864 atoms, Mishin 2004 EAM).
        # Shipped and enforced by tests/gpu/test_eam_mixed_fast_within_threshold.cpp.
        eam_force_relative: 1.0e-5
        # Total PE rel-diff under the same fixture. Derived from force
        # residual on ~3N pair terms; ~10× stricter than force in practice
        # because pair-sum cancels sign-uncorrelated components.
        eam_energy_relative: 1.0e-7
        # Virial Voigt tensor normalized by max component (off-diagonal
        # near-zero on symmetric B2; max-component normalization keeps the
        # rel-diff physically meaningful instead of dividing by its own
        # near-zero magnitude).
        eam_virial_rel_to_max: 5.0e-6
        # NVE energy conservation over 1000 steps. Integrator-level, not a
        # force gate; the 100-step harness in tests/gpu/test_t4_nve_drift.cpp
        # asserts 1e-6 per 100 steps = 10× margin under the 1000-step cap.
        nve_drift_per_1000_steps: 1.0e-5
      sparse_cutoff:
        # Ambition values for LJ/Morse/pair styles when they land on GPU
        # (M9+). Not currently active — no kernel exercises them yet.
        eam_force_relative: 1.0e-6
        eam_energy_relative: 1.0e-8
        status: deferred_m9_plus
      rationale: |
        See docs/specs/gpu/SPEC.md §8.3 for the full analysis and memory
        `project_fp32_eam_ceiling.md` for the T6.8a dev history.
        Summary: dense-cutoff 1e-5 is an FP32 precision ceiling. Relaxing
        the test thresholds would hide real regressions; tightening them
        would fail for physics reasons, not implementation reasons.

    # -------------------------------------------------------------------------
    # GPU MixedFastSnapOnly (Philosophy B-het) differential thresholds.
    #
    # SPEC delta history
    # ------------------
    # v1.0.0 (M8 T8.8 landed 2026-04-20): §D.17 7-step procedure closed; new
    #   BuildFlavor `MixedFastSnapOnlyBuild` shipped with SNAP=FP32 + EAM=FP64
    #   per-kernel precision split (heterogeneous = Philosophy B-het).
    #
    # Derivation summary
    # ------------------
    # * SNAP force / energy budgets inherit MixedFastBuild dense-cutoff
    #   D-M6-8 analog (D-M8-8): FP32 SNAP force chain, FP64 state + accum +
    #   reduction. Justified by SNAP fit RMSE ≈ 13.8 meV/atom (Wood&Thompson
    #   2017, arXiv:1702.07042) being ~3 orders of magnitude above FP32 force
    #   residual at dense-cutoff stencils (~1e-5 rel). FP32 SNAP is
    #   scientifically indistinguishable from FP64 SNAP at the ML noise floor.
    # * EAM force / energy / virial budgets inherit MixedFastBuild values
    #   verbatim: **EAM stays FP64 in this flavor**, so residual vs FP64
    #   reference is pure reduction-order roundoff (~1e-14), but the
    #   published ceiling is anchored at MixedFastBuild's 1e-5/1e-7/5e-6
    #   dense-cutoff values (T6.8a / T7.0 history — `project_fp32_eam_ceiling.md`
    #   memory). This is **not** a relaxation — it is the "we do not exceed
    #   MixedFastBuild on any metric" commitment this flavor makes.
    # * NVE drift per 1000 steps inherits MixedFastBuild 1e-5 ceiling: both
    #   flavors ship FP64 state + FP64 accumulators; integrator-level drift
    #   is bounded by reduction-order roundoff, not by per-kernel precision.
    #
    # Promise: **all thresholds equal-or-tighter than `gpu_mixed_fast`.** This
    # flavor narrows the precision combination; it does not widen any
    # envelope.
    #
    # Status
    # ------
    # * active from T8.8 (SPEC + CMake option shipped 2026-04-20);
    # * kernel split emission lands at T8.9 (SNAP FP32 branch under
    #   `TDMD_FLAVOR_MIXED_FAST_SNAP_ONLY` + EAM FP64 preservation);
    # * slow-tier VerifyLab pass (§D.17 step 5) under T8.12 — hard gate
    #   before M8 closure. Any failure blocks v1.0.0-alpha1 tag.
    #
    # Rationale doc: docs/specs/potentials/mixed_fast_snap_only_rationale.md
    # -------------------------------------------------------------------------
    gpu_mixed_fast_snap_only:
      snap:
        # Per-atom SNAP force L∞ rel-diff vs Fp64ReferenceBuild GPU on T6
        # tungsten fixture (W_2940_2017_2.snap, 2048-atom BCC W). Inherits
        # MixedFastBuild dense-cutoff 1e-5 ceiling per D-M8-8.
        force_relative: 1.0e-5
        # Total SNAP PE rel-diff under same fixture. Pair-sum cancellation
        # ~10x over force residual.
        energy_relative: 1.0e-7
      eam:
        # EAM in this flavor runs FP64 — residual is pure reduction-order
        # roundoff (~1e-14 empirically). Budget anchored at MixedFastBuild's
        # published dense-cutoff ceiling to keep "equal-or-tighter" promise.
        force_relative: 1.0e-5
        energy_relative: 1.0e-7
        virial_rel_to_max: 5.0e-6
      # NVE energy conservation over 1000 steps. Integrator-level; FP64
      # state + accum preserves same envelope as MixedFastBuild.
      nve_drift_per_1000_steps: 1.0e-5
      rationale: |
        Full derivation in docs/specs/potentials/mixed_fast_snap_only_rationale.md
        §3 (empirical evidence SNAP FP32 is below ML fit noise floor) and §4
        (threshold budget table). All thresholds equal-or-tighter than
        `gpu_mixed_fast` — this flavor narrows the precision combination
        without widening any envelope.

    t4_nial_alloy:
      # Ni-Al FCC 6×6×6 (864 atoms), 50:50 random, Mishin 2004 EAM/alloy, NVE,
      # 100 steps, dt=0.001 ps, hard cutoff (LAMMPS `pair_style eam/alloy`
      # default — no shifted-force for EAM; smoothing arrives with T3.*).
      #
      # Thermo thresholds mirror T1 one-for-one: the LAMMPS↔TDMD numerical
      # envelope is set by reduction order + constant discrepancies, not by
      # the choice of pair style.  EAM's two-pass force assembly adds more
      # FLOPs per step but does not widen the residual in FP64.
      thermo_temperature_relative: 2.0e-6
      thermo_potential_energy_relative: 1.0e-10
      thermo_kinetic_energy_relative: 1.0e-10
      thermo_total_energy_relative: 1.0e-10
      thermo_pressure_relative: 1.0e-8

      # Per-atom-per-component forces diff (T2.8 forces layer).  Threshold
      # anchored to `energy.reference_fp64_vs_lammps` — EAM forces are
      # differentiated analytically from the same Hermite spline both sides
      # use (TDMD: `TabulatedFunction`, LAMMPS: `pair_eam.cpp::compute`), so
      # residual is bounded by FP64 eps · O(N_pair) ~ 1e-14 empirically.
      # 1e-10 keeps a 4-decade safety margin for CPU architecture / BLAS
      # variance without being so loose it would hide real regressions.
      forces_relative: 1.0e-10
      rationale: |
        Ni-Al Mishin 2004 EAM/alloy differential.  Both TDMD and LAMMPS
        consume the exact same setfl file (verbatim bytes, no resampling —
        see verify/third_party/potentials/README.md), so the pair/embedding
        table is identical.  Expected residual in FP64:
          * PE / KE / E_total ≈ 0 (reduction-order roundoff only)
          * Forces ≈ 0 (same spline derivation on both sides)
          * Temperature ≈ 1.13e-6 rel (k_B discrepancy, same as T1)
          * Pressure ≈ 1e-10 rel (nktv2p conversion is matched)

        M2 acceptance gate (master spec §14 M2): failing this benchmark
        blocks M2 closure.  Treat threshold relaxations here as a red flag
        — first bisect the regression.
