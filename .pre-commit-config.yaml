# TDMD pre-commit hooks.
# Install: pip install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files
# CI runs this via `pre-commit run --all-files` on every PR (Pipeline A).
#
# Master spec: §15 (engineering methodology).
# Playbook: §5.1 (auto-reject patterns).

default_language_version:
  python: python3

# LFS-tracked binaries are handled via .gitattributes; pre-commit's
# check-added-large-files looks at git index size, which is the pointer (~150B)
# for LFS files, so it does NOT false-positive on large LFS assets.

repos:
  # ---------------------------------------------------------------------------
  # Generic hygiene.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      # docs/_sources/ is read-only upstream reference (master spec Андреева,
      # deep_research_report, spec drafts). CLAUDE.md forbids editing it; these
      # destructive hooks would silently rewrite bytes (incl. the .docx binary).
      - id: trailing-whitespace
        exclude: '^(docs/_sources/|.*\.patch$)'
      - id: end-of-file-fixer
        exclude: '^(docs/_sources/|.*\.svg$)'
      - id: check-yaml
        args: ['--allow-multiple-documents']
        # CMakePresets.json is JSON; ctest config is INI — skip them here
        # (check-json handles JSON separately if we add it later).
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
        # verify/third_party/potentials/ holds committed setfl / EAM tables
        # (e.g. Mishin 2004 Ni-Al is 1.9 MB). These are the canonical parameter
        # files for T4+ benchmarks — required for reproducibility, and not
        # available elsewhere in the LAMMPS submodule. README alongside them
        # documents provenance + license.
        exclude: '^verify/third_party/potentials/.*\.(eam\.alloy|eam\.fs|eam|adp|meam|snap)$'
      - id: check-case-conflict
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: mixed-line-ending
        args: ['--fix=lf']
        exclude: '^docs/_sources/'

  # ---------------------------------------------------------------------------
  # C++ / CUDA — clang-format.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v18.1.8
    hooks:
      - id: clang-format
        # CUDA (.cu, .cuh) is formatted by the same tool.
        types_or: [c++, c, cuda]
        args: ['--style=file']

  # ---------------------------------------------------------------------------
  # Markdown.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.13.0
    hooks:
      - id: markdownlint-cli2
        args: ['--config', '.markdownlint.yaml']
        # docs/_sources/ holds upstream reference material — never reformat.
        exclude: '^docs/_sources/.*'

  # ---------------------------------------------------------------------------
  # CMake / cmake-format.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        args: ['--config-files', '.cmake-format.yaml', '--in-place']
        # cmakelang ships pyyaml as an optional [YAML] extra; pre-commit's
        # default env omits it, so the YAML config loader raises ImportError.
        additional_dependencies: [pyyaml]
        # Exclude third-party cmake (LAMMPS submodule, FetchContent sources).
        exclude: '^(verify/third_party|build/_deps)/.*'
      - id: cmake-lint
        args: ['--config-files', '.cmake-format.yaml']
        additional_dependencies: [pyyaml]
        exclude: '^(verify/third_party|build/_deps)/.*'

  # ---------------------------------------------------------------------------
  # Python — used for build scripts, verify/ tooling, lint helpers.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Shell scripts — shellcheck.
  # ---------------------------------------------------------------------------
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck

  # ---------------------------------------------------------------------------
  # YAML — yamllint (stricter than pre-commit-hooks check-yaml).
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ['-c', '.yamllint.yaml']

  # ---------------------------------------------------------------------------
  # TDMD local hooks.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: tdmd-check-restrict
        name: tdmd-check-restrict (STUB — real impl M2+)
        entry: python3 tools/lint/check_restrict_stub.py
        language: system
        types_or: [c++, cuda]
        # STUB always exits 0. Real check enforces playbook §5.1 rule:
        # hot kernels must use __restrict__ on pointer parameters.
