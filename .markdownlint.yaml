# markdownlint-cli2 config for TDMD.
# Spec files mix Russian prose with English code — some default rules don't fit.

default: true

# MD013 — line length. Long formula descriptions in SPECs routinely exceed 80;
# hard-wrapping breaks readability. Disabled.
MD013: false

# MD024 — duplicate heading content. Module SPECs use repeated section names
# like "Purpose" across subsections. Allow siblings-only.
MD024:
  siblings_only: true

# MD033 — inline HTML. We use <!-- TODO --> markers extensively in templates.
MD033: false

# MD041 — first line must be top-level heading. OK by default.

# MD034 — bare URLs. SPECs sometimes paste raw URLs; allow.
MD034: false

# MD026 — trailing punctuation in heading. Allow "§7." style.
MD026: false

# MD036 — emphasis used instead of heading. Allow (used for role callouts).
MD036: false

# MD046 — code block style. Require fenced (not indented).
MD046:
  style: fenced

# MD048 — code fence style. Require backticks.
MD048:
  style: backtick

# MD007 — unordered list indent. Default 2 spaces is fine.

# MD029 — ordered list prefix. Allow both "1. 2. 3." and "1. 1. 1." styles.
MD029: false

# MD040 — fenced code language required. The existing SPECs (written pre-M0)
# mix prose-only fences with code fences; requiring a language now would force
# mass-editing every SPEC to pick one (text/plain/none). Deferred to a M1+
# lint-sweep SPEC delta; for now, reviewers enforce via PR review.
MD040: false

# MD031 / MD032 — blank lines around fences / lists. Pre-existing SPECs often
# pack lists and fences tightly for density; adding blank lines is cosmetic.
# Keeping disabled for consistency with MD040 deferral above.
MD031: false
MD032: false

# MD022 — blank lines around headings. Same rationale as MD031/MD032: cosmetic,
# mass-fix would touch every SPEC; deferred.
MD022: false

# MD004 — unordered list style. TDMD convention is `-` (dash); the markdownlint
# default `consistent` trips on files that mix `-` and `*`. Lock to `dash`.
MD004:
  style: dash

# MD014 — dollar-prefixed commands without output. Spec examples use
# `$ cmd args` to indicate shell prompts even without output; this is idiomatic.
MD014: false

# MD025 — multiple top-level H1 headings. TDMD_Engineering_Spec.md is a
# multi-part document ("# Часть I", "# Часть II", ...); forcing a single H1
# would break the intentional part structure.
MD025: false

# MD050 — strong style (asterisk vs underscore). SPECs mix both; unifying would
# be a SPEC delta-level churn. Deferred.
MD050: false
