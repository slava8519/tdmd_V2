# Weekly from-scratch CUDA rebuild on the self-hosted runner.
# Catches: CUDA toolkit updates that break our builds, submodule drift,
# regressions from week-over-week dependency churn that pre-commit cache hides.

name: Scheduled CUDA rebuild

on:
  schedule:
    # Every Monday 06:00 UTC.
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  cuda-rebuild:
    name: CUDA from-scratch rebuild
    runs-on: [self-hosted, linux, gpu-rtx5080]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          clean: true

      - name: Print toolchain info
        run: |
          nvidia-smi
          nvcc --version
          cmake --version
          ninja --version

      - name: Configure (default preset)
        run: cmake -B build --preset default -DTDMD_WARNINGS_AS_ERRORS=ON

      - name: Build (no ccache, no cache)
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Cleanup
        if: always()
        run: rm -rf build build_cpu build_debug build_sm89
