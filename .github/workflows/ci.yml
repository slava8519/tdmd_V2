# TDMD CI — Pipeline A (lint + build).
# Master spec §11, §15.1. Playbook §8.
# Pipelines B-F added in M1+ as their test layers come online.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs from the same PR when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # lint — pre-commit hooks (clang-format, markdownlint, cmake-format, ruff,
  # shellcheck, yamllint, etc).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # docs-lint — extra markdown sanity check (explicit, beyond pre-commit).
  # ---------------------------------------------------------------------------
  docs-lint:
    name: Docs lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: '.markdownlint.yaml'
          globs: |
            **/*.md
            !docs/_sources/**
            !verify/third_party/**
            !build/**
            !build_*/**

  # ---------------------------------------------------------------------------
  # build-cpu — CPU-only build, matrix over GCC + Clang. Fast feedback.
  # ---------------------------------------------------------------------------
  build-cpu:
    name: Build CPU (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-13, clang-17]
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            apt: gcc-13 g++-13
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            apt: clang-17

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          # M2 smoke needs the T4 Ni-Al setup.data blob (LFS-tracked).
          lfs: true

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.apt }} cmake ninja-build openmpi-bin libopenmpi-dev

      - name: Configure (cpu-only preset)
        run: cmake -B build_cpu --preset cpu-only -DTDMD_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build_cpu --parallel

      - name: Test
        run: ctest --test-dir build_cpu --output-on-failure

      - name: M1 smoke (Al FCC Morse NVE, 10 steps)
        run: tests/integration/m1_smoke/run_al_morse_smoke.sh --tdmd build_cpu/src/cli/tdmd

      - name: M2 smoke (Ni-Al EAM/alloy NVE + telemetry, 10 steps)
        run: tests/integration/m2_smoke/run_nial_eam_smoke.sh --tdmd build_cpu/src/cli/tdmd

      - name: M3 smoke (zoning plan + mid-run neighbor rebuild, 10 steps)
        run: tests/integration/m3_smoke/run_m3_zoning_smoke.sh --tdmd build_cpu/src/cli/tdmd

      - name: M4 smoke (TD scheduler K=1, byte-exact to M3, 10 steps)
        run: tests/integration/m4_smoke/run_m4_td_smoke.sh --tdmd build_cpu/src/cli/tdmd

      - name: M5 smoke (2-rank MpiHostStaging, byte-exact to M4, 10 steps)
        # Exits 0 with a SKIPPED banner if mpirun is absent — treated as a
        # non-failure so forks without openmpi-bin installed can still merge
        # past this step. D-M5-12 byte-exact regression chain: M3 ≡ M4 ≡ M5
        # thermo golden.
        run: tests/integration/m5_smoke/run_m5_smoke.sh --tdmd build_cpu/src/cli/tdmd

      - name: Upload compile_commands.json
        if: matrix.compiler == 'clang-17'
        uses: actions/upload-artifact@v4
        with:
          name: compile-commands-cpu
          path: build_cpu/compile_commands.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # differential-t1 — T1 benchmark (Al FCC Morse NVE, 500 atoms, 100 steps)
  # diffed against a LAMMPS oracle. verify/SPEC.md §4 (benchmarks), §7 (harness).
  #
  # Option A CI policy (docs/development/m0_execution_pack.md): the LAMMPS
  # submodule is NOT fetched on the public runner, so the differential test
  # detects the absent oracle binary and exits 77 (SKIP_RETURN_CODE). The job
  # still runs end-to-end to guarantee the harness infrastructure (Python
  # driver, checks.yaml, thresholds.yaml) stays green. Full oracle comparison
  # is part of the local pre-push protocol until an isolated GPU runner is
  # provisioned (revisit at M6).
  # ---------------------------------------------------------------------------
  differential-t1:
    name: Differential T1 vs LAMMPS (SKIP on public CI)
    runs-on: ubuntu-latest
    needs: build-cpu
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness deps
        run: pip install pyyaml

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 cmake ninja-build

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake -B build_cpu --preset cpu-only

      - name: Build
        run: cmake --build build_cpu --parallel

      - name: Run T1 differential harness
        run: ctest --test-dir build_cpu --output-on-failure -R test_t1_differential

  # ---------------------------------------------------------------------------
  # differential-t4 — M2 acceptance gate: Ni-Al EAM/alloy (Mishin 2004) 864
  # atoms, 100 steps, diffed against a LAMMPS oracle. See verify/SPEC.md §4.7.
  #
  # Same Option A skip semantics as differential-t1: public runner has no
  # LAMMPS submodule, so the Catch2 wrapper exits 77. The job guards the
  # harness wiring (Python driver, checks.yaml, setfl path resolution) so a
  # bitrot PR would fail CI even when the oracle is absent.
  # ---------------------------------------------------------------------------
  differential-t4:
    name: Differential T4 vs LAMMPS (SKIP on public CI)
    runs-on: ubuntu-latest
    needs: build-cpu
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness deps
        run: pip install pyyaml

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 cmake ninja-build

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake -B build_cpu --preset cpu-only

      - name: Build
        run: cmake --build build_cpu --parallel

      - name: Run T4 differential harness
        run: ctest --test-dir build_cpu --output-on-failure -R test_t4_differential

  # ---------------------------------------------------------------------------
  # build-gpu — CUDA compile + link matrix on ubuntu-latest. T6.12 (M6).
  #
  # Option A CI policy (memory `project_option_a_ci.md`, D-M6-6): public repo,
  # no self-hosted runner. GitHub-hosted `ubuntu-latest` has no GPU, so this
  # job is **compile-only** — the test binaries link against libcudart and
  # self-skip at runtime via `cudaGetDeviceCount() != cudaSuccess`. That still
  # catches: (a) CUDA source regressions in `src/gpu/*.cu`; (b) PIMPL firewall
  # breaks (CUDA headers leaking to public API); (c) NVTX macro regressions
  # via `test_nvtx_audit` (pure file-walker — runs meaningfully on CI);
  # (d) CPU-side test_gpu_types + test_gpu_cost_tables compile matrix.
  #
  # Matrix: BuildFlavor ∈ {Fp64ReferenceBuild, MixedFastBuild} so the
  # flavor-dispatched adapter + MixedFast EAM kernel both stay compile-clean.
  # CUDA archs = 80;86;89;90 (Ampere/Ada/Hopper); sm_100 (Blackwell) + sm_120
  # (RTX 5080 dev machine) require CUDA 12.8+ which ubuntu apt doesn't ship —
  # local dev covers those via `--preset default`.
  #
  # Full runtime gates (kernel bit-exactness, MixedFast thresholds, T3-gpu
  # anchor, M6 smoke) run via local pre-push protocol — see tools/ and
  # docs/development/ci_setup.md "Local GPU gate".
  # ---------------------------------------------------------------------------
  build-gpu:
    name: Build GPU compile-only (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [Fp64ReferenceBuild, MixedFastBuild]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: true

      - name: Install toolchain + CUDA
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 cmake ninja-build \
            nvidia-cuda-toolkit

      - name: Configure (CUDA ${{ matrix.flavor }}, archs 80;86;89;90)
        env:
          CC: gcc-13
          CXX: g++-13
        run: |
          cmake -B build_gpu -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTDMD_BUILD_CUDA=ON \
            -DTDMD_BUILD_TESTS=ON \
            -DTDMD_BUILD_FLAVOR=${{ matrix.flavor }} \
            -DTDMD_CUDA_ARCHS="80;86;89;90" \
            -DTDMD_WARNINGS_AS_ERRORS=ON

      - name: Build (compile + link)
        run: cmake --build build_gpu --parallel

      - name: Run GPU-free tests (structural checks; runtime kernels self-skip)
        # Catches NVTX audit regressions + PerfModel cost-table structural
        # invariants + pure-C++ gpu_types on every PR. Other GPU tests SKIP
        # via `cudaGetDeviceCount() != cudaSuccess` — they still run through
        # their own harness so test-binary link-time issues surface here.
        run: |
          ctest --test-dir build_gpu --output-on-failure \
            -R 'test_gpu_types|test_nvtx_audit|test_gpu_cost_tables|test_perfmodel'
