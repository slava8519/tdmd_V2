# TDMD CI — Pipeline A (lint + build).
# Master spec §11, §15.1. Playbook §8.
# Pipelines B-F added in M1+ as their test layers come online.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs from the same PR when new commits arrive.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # lint — pre-commit hooks (clang-format, markdownlint, cmake-format, ruff,
  # shellcheck, yamllint, etc).
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pre-commit envs
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: pip install pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure

  # ---------------------------------------------------------------------------
  # docs-lint — extra markdown sanity check (explicit, beyond pre-commit).
  # ---------------------------------------------------------------------------
  docs-lint:
    name: Docs lint (markdownlint-cli2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: '.markdownlint.yaml'
          globs: |
            **/*.md
            !docs/_sources/**
            !verify/third_party/**
            !build/**
            !build_*/**

  # ---------------------------------------------------------------------------
  # build-cpu — CPU-only build, matrix over GCC + Clang. Fast feedback.
  # ---------------------------------------------------------------------------
  build-cpu:
    name: Build CPU (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc-13, clang-17]
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            apt: gcc-13 g++-13
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            apt: clang-17

    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ${{ matrix.apt }} cmake ninja-build

      - name: Configure (cpu-only preset)
        run: cmake -B build_cpu --preset cpu-only -DTDMD_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build_cpu --parallel

      - name: Test
        run: ctest --test-dir build_cpu --output-on-failure

      - name: Upload compile_commands.json
        if: matrix.compiler == 'clang-17'
        uses: actions/upload-artifact@v4
        with:
          name: compile-commands-cpu
          path: build_cpu/compile_commands.json
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # differential-t1 — T1 benchmark (Al FCC Morse NVE, 500 atoms, 100 steps)
  # diffed against a LAMMPS oracle. verify/SPEC.md §4 (benchmarks), §7 (harness).
  #
  # Option A CI policy (docs/development/m0_execution_pack.md): the LAMMPS
  # submodule is NOT fetched on the public runner, so the differential test
  # detects the absent oracle binary and exits 77 (SKIP_RETURN_CODE). The job
  # still runs end-to-end to guarantee the harness infrastructure (Python
  # driver, checks.yaml, thresholds.yaml) stays green. Full oracle comparison
  # is part of the local pre-push protocol until an isolated GPU runner is
  # provisioned (revisit at M6).
  # ---------------------------------------------------------------------------
  differential-t1:
    name: Differential T1 vs LAMMPS (SKIP on public CI)
    runs-on: ubuntu-latest
    needs: build-cpu
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install harness deps
        run: pip install pyyaml

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-13 g++-13 cmake ninja-build

      - name: Configure
        env:
          CC: gcc-13
          CXX: g++-13
        run: cmake -B build_cpu --preset cpu-only

      - name: Build
        run: cmake --build build_cpu --parallel

      - name: Run T1 differential harness
        run: ctest --test-dir build_cpu --output-on-failure -R test_t1_differential

  # ---------------------------------------------------------------------------
  # NOTE: CUDA / GPU build is intentionally NOT in CI.
  # Rationale: self-hosted runner on a public repo executes arbitrary PR code on
  # the dev workstation. See docs/development/m0_execution_pack.md "Option A".
  # GPU tests are run locally before push:
  #   cmake --preset default && cmake --build build && ctest --preset default
  #   tools/build_lammps.sh && tools/lammps_smoke_test.sh
  # Revisit when M6 (GPU path) lands and an isolated runner (container/VM) is
  # available.
  # ---------------------------------------------------------------------------
