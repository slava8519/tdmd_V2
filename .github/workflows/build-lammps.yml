# Opt-in LAMMPS oracle rebuild.
# Full build takes 15-30 min and needs a self-hosted runner with GPU.
# Currently no self-hosted runner is registered (see docs/development/m0_execution_pack.md
# "Option A"); this workflow is kept for future reactivation. Until then, run
# locally: tools/build_lammps.sh && tools/lammps_smoke_test.sh
#
# When a runner is eventually registered, re-enable the triggers below.
# Triggers (when runner exists):
#   - `lammps-rebuild` label on a PR
#   - manual workflow_dispatch
# (Weekly cron intentionally omitted: the scheduled-cuda-rebuild.yml precedent
# showed that schedules hang jobs indefinitely when no runner is registered.)

name: Build LAMMPS oracle

on:
  pull_request:
    types: [labeled]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: build-lammps-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-lammps:
    name: Build LAMMPS (sm_120 + required packages)
    # Only run on label, cron, or manual dispatch.
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' &&
       contains(github.event.pull_request.labels.*.name, 'lammps-rebuild'))
    runs-on: [self-hosted, linux, gpu-rtx5080]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Init LAMMPS submodule
        run: git submodule update --init --depth 1 verify/third_party/lammps

      - name: Print toolchain info
        run: |
          nvidia-smi
          nvcc --version
          cmake --version

      - name: Build LAMMPS
        run: tools/build_lammps.sh

      - name: Verify required packages
        run: |
          # Shared-libs install; point the loader at install_tdmd/lib/.
          export LD_LIBRARY_PATH="$PWD/verify/third_party/lammps/install_tdmd/lib:${LD_LIBRARY_PATH:-}"
          verify/third_party/lammps/install_tdmd/bin/lmp -h | \
            tee lammps_help.txt | \
            grep -E 'GPU|MANYBODY|MEAM|ML-SNAP|MOLECULE|KSPACE|EXTRA-PAIR|EXTRA-DUMP'

      - name: Run LAMMPS smoke test
        run: tools/lammps_smoke_test.sh

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lammps-build-log
          path: |
            verify/third_party/lammps/build_tdmd/CMakeCache.txt
            verify/third_party/lammps/build_tdmd/CMakeFiles/CMakeOutput.log
            lammps_help.txt
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: rm -rf verify/third_party/lammps/build_tdmd
