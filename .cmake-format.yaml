# cmake-format config for TDMD.
# Docs: https://cmake-format.readthedocs.io/

format:
  # Line length — match .clang-format ColumnLimit.
  line_width: 100
  tab_size: 2
  use_tabchars: false
  separate_ctrl_name_with_space: false
  separate_fn_name_with_space: false
  dangle_parens: false
  # Wrap arguments one-per-line when they don't fit, preserving first-arg attachment.
  dangle_align: prefix
  min_prefix_chars: 4
  max_prefix_chars: 10
  max_lines_hwrap: 2
  line_ending: unix
  command_case: lower
  keyword_case: upper
  # Always trailing comma for multi-line argument lists.
  enable_sort: true
  autosort: false
  # Preserve comment blocks (important for # TODO, # NOTE, # NOLINT markers).
  hashruler_min_length: 10
  canonicalize_hashrulers: true

parse:
  # TDMD-specific custom commands (fill in as we introduce them).
  additional_commands:
    tdmd_apply_build_flavor:
      pargs: 1   # target name
      flags: []
      kwargs:
        FLAVOR: '*'
    tdmd_add_module:
      pargs: 1   # module name
      flags: [NO_CUDA, HEADER_ONLY]
      kwargs:
        SOURCES: '*'
        HEADERS: '*'
        DEPS: '*'

markup:
  bullet_char: '-'
  enum_char: '.'
  first_comment_is_literal: true
  literal_comment_pattern: null
  fence_pattern: '^\s*([`~]{3}[`~]*)(.*)$'
  ruler_pattern: '^\s*[^\w\s]{3}.*[^\w\s]{3}$'
  explicit_trailing_pattern: '#<'
  hashruler_min_length: 10

lint:
  disabled_codes:
    - C0113   # missing docstring on function (we document via adjacent .md)
    - C0321   # multiple statements on one line (cmake idiomatic sometimes)
  function_pattern: '[0-9a-z_]+'
  macro_pattern: '[0-9A-Z_]+'
  global_var_pattern: '[A-Z][0-9A-Z_]+'
  internal_var_pattern: '_[0-9A-Z_]+'
  local_var_pattern: '[a-z][a-z0-9_]+'
  private_var_pattern: '_[0-9a-z_]+'
  public_var_pattern: '[A-Z][0-9A-Z_]+'
  argument_var_pattern: '[a-z][a-z0-9_]+'
  keyword_pattern: '[A-Z][0-9A-Z_]+'
  max_conditionals_custom_parser: 2
  min_statement_spacing: 1
  max_statement_spacing: 2
  max_returns: 6
  max_branches: 12
  max_arguments: 5
  max_localvars: 15
  max_statements: 50
