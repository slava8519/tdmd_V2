# Expect: preflight Error — `atoms.path` points at a file that does not exist.
# Parse succeeds (structurally fine); preflight is what fails.

simulation:
  units: metal

atoms:
  source: lammps_data
  path: ./this_file_does_not_exist.data

potential:
  style: morse
  params:
    D: 0.2703
    alpha: 1.1646
    r0: 3.253
    cutoff: 8.0

integrator:
  style: velocity_verlet
  dt: 0.001

run:
  n_steps: 100
