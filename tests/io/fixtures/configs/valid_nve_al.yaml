# Minimal M1 tdmd.yaml for an Al FCC NVE run — points at the 32-atom
# .data fixture from T1.3. All required fields present; optionals omitted to
# exercise the default path.

simulation:
  units: metal
  seed: 42

atoms:
  source: lammps_data
  path: ../al_fcc_small.data

potential:
  style: morse
  params:
    # Girifalco-Weizer Al (1959): D=0.2703 eV, alpha=1.1646 1/Å, r0=3.253 Å.
    D: 0.2703
    alpha: 1.1646
    r0: 3.253
    cutoff: 8.0
    cutoff_strategy: shifted_force

integrator:
  style: velocity_verlet
  dt: 0.001   # ps (metal)

neighbor:
  skin: 0.3

run:
  n_steps: 100
