# Expect: preflight Error on `integrator.dt` (<= 0). Parses fine — the
# structural schema is OK, only the semantic rule fires.

simulation:
  units: metal

atoms:
  source: lammps_data
  path: ../al_fcc_small.data

potential:
  style: morse
  params:
    D: 0.2703
    alpha: 1.1646
    r0: 3.253
    cutoff: 8.0

integrator:
  style: velocity_verlet
  dt: -0.001

run:
  n_steps: 100
